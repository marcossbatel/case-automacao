info:
  name: posts by id
  type: http
  seq: 1

http:
  method: GET
  url: https://jsonplaceholder.typicode.com/posts/1
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("O status do retorno deve ser 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        test("A resposta é um objeto JSON", function () {
          expect(body).to.be.an("object");
        });

        test("O ID do retorno é igual a 1", function () {
            expect(body.id).to.equal(1);
        });

        test("O retorno possui todos os campos", function () {
          expect(body).to.have.property("userId");
          expect(body).to.have.property("id");
          expect(body).to.have.property("title");
          expect(body).to.have.property("body");
          expect(body.userId).to.not.be.null;
          expect(body.id).to.not.be.null;
          expect(body.title).to.not.be.empty;
          expect(body.body).to.not.be.empty;
        });

        test("O tipo de cada campo no retorno é correto", function () {
            expect(body.userId).to.be.a("number");
            expect(body.id).to.be.a("number");
            expect(body.title).to.be.a("string");
            expect(body.body).to.be.a("string");
        });

        test("O body do retorno não é vazio", function () {
            expect(body.body.length).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
